<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentiric OS | Innovation Lab</title>
    <style>
        :root { --bg: #09090b; --card: #18181b; --primary: #4f46e5; --text: #f4f4f5; --muted: #a1a1aa; --border: #27272a; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .hero { text-align: center; padding: 6rem 1rem; width: 100%; background: radial-gradient(circle at 50% 0%, rgba(79, 70, 229, 0.15) 0%, transparent 50%); border-bottom: 1px solid var(--border); }
        .hero h1 { font-size: 3.5rem; margin: 0; letter-spacing: -2px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 1.5rem; width: 100%; max-width: 1200px; padding: 4rem 2rem; box-sizing: border-box; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 2rem; border-radius: 1.25rem; text-decoration: none; color: inherit; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .card:hover { transform: translateY(-8px); border-color: var(--primary); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .card.locked { opacity: 0.5; cursor: not-allowed; border-style: dashed; }
        .badge { position: absolute; top: 1rem; right: 1rem; font-size: 0.65rem; font-weight: 700; padding: 0.25rem 0.6rem; border-radius: 2rem; background: var(--border); color: var(--muted); text-transform: uppercase; }
        .badge.active { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .icon { font-size: 2.5rem; margin-bottom: 1rem; display: block; }
        h3 { margin: 0.5rem 0; font-size: 1.4rem; color: #fff; }
        p { margin: 0; color: var(--muted); font-size: 0.95rem; line-height: 1.5; flex-grow: 1; }
        .launch { margin-top: 1.5rem; color: var(--primary); font-weight: 600; font-size: 0.9rem; }
    </style>
  <script type="module" crossorigin src="/sentiric-playground/assets/main-D8qpFTr_.js"></script>
  <link rel="modulepreload" crossorigin href="/sentiric-playground/assets/modulepreload-polyfill-BYiSvEMS.js">
</head>
<body>
    <header class="hero">
        <h1>Sentiric Lab.</h1>
        <p>Geleceğin iletişim katmanını bugün test edin.</p>
    </header>
    <main class="grid" id="main-grid"></main>

</body>
</html>
