<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="https://sentiric.github.io/sentiric-assets/image/favicon.svg">
    <title>Sentiric OS | Innovation Lab</title>
    <style>
        :root { --bg: #09090b; --card: #18181b; --primary: #4f46e5; --text: #f4f4f5; --muted: #a1a1aa; --border: #27272a; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .hero { text-align: center; padding: 6rem 1rem; width: 100%; background: radial-gradient(circle at 50% 0%, rgba(79, 70, 229, 0.15) 0%, transparent 50%); border-bottom: 1px solid var(--border); }
        .hero h1 { font-size: 3.5rem; margin: 0; letter-spacing: -2px; font-weight: 900; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 1.5rem; width: 100%; max-width: 1200px; padding: 4rem 2rem; box-sizing: border-box; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 2.5rem; border-radius: 1.5rem; text-decoration: none; color: inherit; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .card:hover { transform: translateY(-12px); border-color: var(--primary); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .badge { position: absolute; top: 1.2rem; right: 1.2rem; font-size: 0.65rem; font-weight: 800; padding: 0.3rem 0.7rem; border-radius: 2rem; background: rgba(16, 185, 129, 0.1); color: #10b981; text-transform: uppercase; }
        .icon { font-size: 3rem; margin-bottom: 1.5rem; display: block; transition: transform 0.3s ease; }
        .card:hover .icon { transform: scale(1.1) rotate(5deg); }
        h3 { margin: 0 0 0.5rem 0; font-size: 1.6rem; color: #fff; font-weight: 700; }
        p { margin: 0; color: var(--muted); font-size: 1rem; line-height: 1.6; flex-grow: 1; }
        .launch { margin-top: 2rem; color: var(--primary); font-weight: 700; font-size: 0.95rem; border-top: 1px solid var(--border); padding-top: 1.5rem; }
    </style>
