<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognitive Mirror | Sentiric Lab</title>
  <script type="module" crossorigin src="/sentiric-playground/assets/cognitive-mirror-NhspegYm.js"></script>
  <link rel="modulepreload" crossorigin href="/sentiric-playground/assets/modulepreload-polyfill-DJVeZdMt.js">
  <link rel="modulepreload" crossorigin href="/sentiric-playground/assets/sdk-provider-DKD9lYMR.js">
  <link rel="stylesheet" crossorigin href="/sentiric-playground/assets/cognitive-mirror-BdFVXnTx.css">
</head>
<body>
    <div class="app-shell">
        <header>
            <a href="/sentiric-playground/">← Lab</a> 
            <div class="header-info">
                <h1>Cognitive Mirror</h1>
                <div id="connection-status" class="dot"></div>
            </div>
        </header>

        <main class="split-view">
            <!-- Sol: Diyalog Akışı -->
            <section class="pane stream">
                <div class="label">🎙️ BİLİNÇ AKIŞI</div>
                <div id="transcriptBox" class="scroll-area"></div>
            </section>

            <!-- Sağ: Bilişsel Hafıza ve Radar -->
            <section class="pane mental-state">
                <div class="label">🧠 BİLİŞSEL HAFIZA (REAL-TIME)</div>
                
                <div class="mood-radar">
                    <div class="radar-circle" id="radar">
                        <span id="moodVal">NEUTRAL</span>
                    </div>
                </div>

                <div class="memory-grid" id="memoryCards">
                    <!-- Kartlar buraya dinamik eklenecek -->
                </div>
            </section>
        </main>

        <footer class="action-bar">
            <button id="toggleBtn">SİSTEMİ BAŞLAT</button>
        </footer>
    </div>
</body>
</html>
