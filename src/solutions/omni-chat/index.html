<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Chat | Sentiric Lab</title>
  <script type="module" crossorigin src="/sentiric-playground/assets/omni-chat-BLRSA8S1.js"></script>
  <link rel="modulepreload" crossorigin href="/sentiric-playground/assets/sdk-provider-B4CKOBtL.js">
  <link rel="stylesheet" crossorigin href="/sentiric-playground/assets/omni-chat-BexLJftg.css">
</head>
<body>
    <div class="chat-layout">
        <header>
            <a href="/sentiric-playground/">← Lab</a>
            <h1>Omni-Chat AI</h1>
            <span class="mode-badge">CHAT-ONLY</span>
        </header>

        <main id="chatBox" class="chat-messages">
            <div class="system-notice">Oturum başlatıldı. AI ile yazışmaya başlayabilirsiniz.</div>
        </main>

        <footer class="input-container">
            <div class="input-wrapper">
                <input type="text" id="msgInput" placeholder="Mesajınızı buraya yazın..." autocomplete="off">
                <button id="sendBtn">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </footer>
    </div>
</body>
</html>
