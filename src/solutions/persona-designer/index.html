<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8"><title>Persona Designer | Sentiric Lab</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="designer-layout">
        <aside class="studio-panel">
            <header>
                <a href="/sentiric-playground/">← Lab</a>
                <h1>PERSONA STUDIO</h1>
            </header>

            <div class="settings-form">
                <label>Kişilik Tanımı (System Prompt)</label>
                <textarea id="sysPrompt" placeholder="Örn: Sen neşeli bir barista asistanısın...">Sen yardımsever ve profesyonel bir Sentiric asistanısın.</textarea>
                
                <label>Ses Karakteri (TTS Voice)</label>
                <select id="voiceId">
                    <option value="omnivoice:F_TR_Parlak_Zeynep/neutral">Zeynep (Parlak/Kurumsal)</option>
                    <option value="omnivoice:M_TR_Otoriter_Can/deep">Can (Derin/Otoriter)</option>
                    <option value="omnivoice:F_TR_Yumusak_Elif/calm">Elif (Sakin/Yumuşak)</option>
                </select>

                <button id="applyBtn">TASARIMI UYGULA VE BAŞLAT</button>
            </div>
        </aside>

        <main class="preview-panel">
            <div id="preview-status" class="preview-label">LIVE PREVIEW: STANDBY</div>
            <div id="chat-stream" class="chat-flow"></div>
            <div class="mic-hint">Tasarımı uyguladıktan sonra konuşmaya başlayın.</div>
        </main>
    </div>
    <script type="module" src="./main.ts"></script>
</body>
</html>
