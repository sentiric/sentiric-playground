<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8"><title>Vision Agent | Sentiric Lab</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="vision-layout">
        <header>
            <a href="/sentiric-playground/">← Lab</a>
            <div class="title">👁️‍🗨️ VISION AGENT <span class="live-tag">BETA</span></div>
        </header>

        <main class="viewport-container">
            <video id="webcam" autoplay playsinline muted></video>
            <canvas id="overlay"></canvas>
            
            <div class="scanner-line"></div>
            
            <div id="ai-insights" class="ai-overlay-text">
                KAMERA ERİŞİMİ BEKLENİYOR...
            </div>
        </main>

        <footer class="controls">
            <button id="cameraBtn">KAMERAYI ETKİNLEŞTİR</button>
            <div class="telemetry">FPS: <span id="fps">0</span> | OBJECTS: <span id="objCount">0</span></div>
        </footer>
    </div>
    <script type="module" src="./main.ts"></script>
</body>
</html>
